version: '3.8'

networks:
  nextcloud-net:
    driver: bridge

services:
  db:
    image: mariadb:10.6
    container_name: nextcloud-db
    restart: always
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
    volumes:
      - /vol1/1000/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=bingo123
      - MYSQL_PASSWORD=bingo123
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    networks:
      - nextcloud-net

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: always
    networks:
      - nextcloud-net

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: always
    ports:
      - "8887:80"
    volumes:
      - /vol1/1000/nextcloud/onlyoffice:/var/www/onlyoffice/Data
    environment:
      - JWT_ENABLED=false
    networks:
      - nextcloud-net

  app:
    image: nextcloud:latest
    container_name: nextcloud
    restart: always
    ports:
      - "8888:80"
    depends_on:
      - db
      - redis
      - onlyoffice
    volumes:
      - /vol1/1000/nextcloud/data:/var/www/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=bingo123
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=bingo123
      - NEXTCLOUD_TRUSTED_DOMAINS="n.dxcp.qzz.io 192.168.88.101:8888"
      - REDIS_HOST=redis
    networks:
      - nextcloud-net

